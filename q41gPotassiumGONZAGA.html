<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Rating</title>
    <style>
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            padding: 40px 20px; 
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #001529 0%, #003366 100%);
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container { 
            background-color: #ffffff;
            padding: 30px; 
            width: 100%;
            max-width: 350px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        h2, h3 { 
            color: #001f3f; 
            text-align: center;
            margin-top: 0;
        }

        .form-group { 
            margin-bottom: 15px; 
        }

        label {
            font-weight: 600;
            display: block;
            color: #444;
            margin-bottom: 5px;
            font-size: 14px;
        }

        input, select { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box; 
            font-size: 14px;
        }

        #star-rating {
            padding: 5px 0;
            text-align: center;
        }

        .star { 
            font-size: 30px; 
            cursor: pointer; 
            color: #e0e0e0; 
            transition: transform 0.1s;
            display: inline-block;
        }

        .star.selected { 
            color: #f1c40f; 
        }

        button { 
            width: 100%; 
            padding: 12px; 
            background-color: #001f3f; 
            color: white; 
            border: none; 
            border-radius: 6px;
            cursor: pointer; 
            font-weight: bold;
            font-size: 16px;
            margin-top: 10px;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #003366;
        }

        .movie-item { 
            background: #f8f9fa;
            border-left: 5px solid #001f3f;
            padding: 12px; 
            margin-top: 10px; 
            border-radius: 6px; 
            font-size: 14px;
            color: #333;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Add a Movie</h2>
    <form id="movieForm">
        <div class="form-group">
            <label>Title:</label>
            <input type="text" id="title" required>
        </div>

        <div class="form-group">
            <label>Year:</label>
            <input type="number" id="year" required>
        </div>

        <div class="form-group">
            <label>Genre:</label>
            <select id="genre">
                <option value="Action">Action</option>
                <option value="Comedy">Comedy</option>
                <option value="Drama">Drama</option>
                <option value="Fantasy">Fantasy</option>
                <option value="Horror">Horror</option>
                <option value="Musical">Musical</option>
                <option value="Mystery">Mystery</option>
                <option value="Romance">Romance</option>
                <option value="Science Fiction">Science Fiction</option>
                <option value="Thriller">Thriller</option>
            </select>
        </div>

        <div class="form-group">
            <label>Rating:</label>
            <div id="star-rating">
                <span class="star" data-value="1">★</span>
                <span class="star" data-value="2">★</span>
                <span class="star" data-value="3">★</span>
                <span class="star" data-value="4">★</span>
                <span class="star" data-value="5">★</span>
            </div>
        </div>
        <button type="submit">Add Movie</button>
    </form>

    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

    <h3>Movie List</h3>
    <div id="movieDisplayList"></div>
</div>

<script>
let currentRating = 0;
    const stars = document.querySelectorAll('.star');

    stars.forEach(star => {
        star.addEventListener('click', () => {
            currentRating = star.getAttribute('data-value');
            stars.forEach(s => s.classList.toggle('selected', s.getAttribute('data-value') <= currentRating));
        });
    });

    document.getElementById('movieForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const newMovie = {
            title: document.getElementById('title').value,
            year: document.getElementById('year').value,
            genre: document.getElementById('genre').value,
            rating: currentRating
        };

        const movies = JSON.parse(localStorage.getItem('movies')) || [];
        movies.push(newMovie);
        localStorage.setItem('movies', JSON.stringify(movies));
        
        displayMovies();
        e.target.reset();
        currentRating = 0;
        stars.forEach(s => s.classList.remove('selected'));
    });

    function displayMovies() {
        const listDiv = document.getElementById('movieDisplayList');
        const movies = JSON.parse(localStorage.getItem('movies')) || [];
        listDiv.innerHTML = movies.map(m => `
            <div class="movie-item">
                <strong>${m.title} (${m.year})</strong><br>
                ${m.genre}, <span style="color: #f1c40f;">${'★'.repeat(m.rating)}</span>
            </div>
        `).join('');
    }

    displayMovies(); 
</script>

</body>
</html>
