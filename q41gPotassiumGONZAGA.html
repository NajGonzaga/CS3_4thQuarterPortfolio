<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie Rating</title>
    <style>
        body { 
        font-family: sans-serif; 
        padding: 20px; 
        }

        .container { 
        border: 1px solid #ccc; 
        padding: 20px; 
        width: 350px; 
        border-radius: 8px; 
        }

        .form-group { 
            margin-bottom: 15px; 
        }
        input, select { 
            width: 100%; 
            padding: 8px; 
            margin-top: 5px; 
            box-sizing: border-box; 
        }

        .star { 
            font-size: 24px; 
            cursor: pointer; 
            color: #ccc; 
        }
        .star.selected { 
            color: gold; 
        }

        button { 
            width: 100%; 
            padding: 10px; 
            background-color: #007bff; 
            color: white; 
            border: none; 
            cursor: pointer; 
            margin-top: 10px; 
        }

        .movie-item { 
            border: 1px solid #eee; 
            padding: 10px; 
            margin-top: 10px; 
            border-radius: 4px; 
        }

    </style>
</head>
<body>

<div class="container">
    <h2>Add a Movie</h2>
    <form id="movieForm">
        <div class="form-group">
            <label>Title:</label>
            <input type="text" id="title" required>
        </div>

        <div class="form-group">
            <label>Year:</label>
            <input type="number" id="year" required>
        </div>

        <div class="form-group">
            <label>Genre:</label>
            <select id="genre">
                <option value="Action">Action</option>
                <option value="Comedy">Comedy</option>
                <option value="Drama">Drama</option>
                <option value="Fantasy">Fantasy</option>
                <option value="Horror">Horror</option>
                <option value="Musical">Musical</option>
                <option value="Mystery">Mystery</option>
                <option value="Romance">Romance</option>
                <option value="Science Fiction">Science Fiction</option>
                <option value="Thriller">Thriller</option>
            </select>
        </div>

        <div class="form-group">
            <label>Rating:</label>
            <div id="star-rating">
                <span class="star" data-value="1">★</span>
                <span class="star" data-value="2">★</span>
                <span class="star" data-value="3">★</span>
                <span class="star" data-value="4">★</span>
                <span class="star" data-value="5">★</span>
            </div>
        </div>
        <button type="submit">Add Movie</button>
    </form>

    <h3>Movie List</h3>
    <div id="movieDisplayList"></div>
</div>

<script>

    let currentRating = 0;
    const stars = document.querySelectorAll('.star');

    stars.forEach(star => {
        star.addEventListener('click', () => {
            currentRating = star.getAttribute('data-value');
            stars.forEach(s => s.classList.toggle('selected', s.getAttribute('data-value') <= currentRating));
        });
    });

    document.getElementById('movieForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const newMovie = {
            title: document.getElementById('title').value,
            year: document.getElementById('year').value,
            genre: document.getElementById('genre').value,
            rating: currentRating
        };

        const movies = JSON.parse(localStorage.getItem('movies')) || [];
        movies.push(newMovie);
        localStorage.setItem('movies', JSON.stringify(movies));
        
        displayMovies();
        e.target.reset();
        currentRating = 0;
        stars.forEach(s => s.classList.remove('selected'));
    });

    function displayMovies() {
        const listDiv = document.getElementById('movieDisplayList');
        const movies = JSON.parse(localStorage.getItem('movies')) || [];
        listDiv.innerHTML = movies.map(m => `
            <div class="movie-item">
                <strong>${m.title} (${m.year})</strong> - ${m.genre}, Rating: ${'★'.repeat(m.rating)}
            </div>
        `).join('');
    }

    displayMovies(); 

    function deleteMovie(index) {
        if (confirm("Are you sure you want to remove this movie?")) {
            const movies = JSON.parse(localStorage.getItem('movies')) || [];
            
            movies.splice(index, 1);
            
            localStorage.setItem('movies', JSON.stringify(movies));
            
            displayMovies();
        }
    }

</script>

</body>
</html>
