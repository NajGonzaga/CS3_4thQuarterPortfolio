<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Rating - UD Implementation</title>
    <style>
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            padding: 40px 20px; 
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #001529 0%, #003366 100%);
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container { 
            background-color: #ffffff;
            padding: 30px; 
            width: 100%;
            max-width: 400px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        h2, h3 { 
            color: #001f3f; 
            text-align: center;
            margin-top: 0;
            letter-spacing: 0.5px;
        }

        .form-group { 
            margin-bottom: 15px; 
        }

        label {
            font-weight: 600;
            display: block;
            color: #444;
            margin-bottom: 5px;
            font-size: 14px;
        }

        input, select { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box; 
            font-size: 14px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #003366;
            box-shadow: 0 0 0 2px rgba(0,51,102,0.1);
        }

        .star-container {
            padding: 5px 0;
            text-align: center;
        }

        .star { 
            font-size: 32px; 
            cursor: pointer; 
            color: #e0e0e0; 
            transition: transform 0.1s;
            display: inline-block;
        }

        .star:hover { transform: scale(1.1); }

        .star.selected { 
            color: #f1c40f; 
        }

        button#submitBtn { 
            width: 100%; 
            padding: 12px; 
            background-color: #001f3f; 
            color: white; 
            border: none; 
            border-radius: 6px;
            cursor: pointer; 
            font-weight: bold;
            font-size: 16px;
            margin-top: 10px;
            transition: background 0.3s;
        }

        button#submitBtn:hover {
            background-color: #003366;
        }

        .movie-item { 
            background: #f8f9fa;
            border-left: 5px solid #001f3f;
            padding: 15px; 
            margin-top: 12px; 
            border-radius: 6px; 
            position: relative;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .delete-btn {
            background-color: #c0392b;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            float: right;
            font-size: 11px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .delete-btn:hover {
            background-color: #a93226;
        }

        .movie-info {
            display: block;
            margin-bottom: 5px;
            color: #333;
        }

        .rating-stars {
            color: #f1c40f;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Add / Update Movie</h2>
    <form id="movieForm">
        <div class="form-group">
            <label>Movie Title:</label>
            <input type="text" id="title" placeholder="e.g. Inception" required>
        </div>

        <div class="form-group">
            <label>Release Year:</label>
            <input type="number" id="year" placeholder="YYYY" required>
        </div>

        <div class="form-group">
            <label>Genre:</label>
            <select id="genre">
                <option value="Action">Action</option>
                <option value="Comedy">Comedy</option>
                <option value="Drama">Drama</option>
                <option value="Fantasy">Fantasy</option>
                <option value="Horror">Horror</option>
                <option value="Musical">Musical</option>
                <option value="Science Fiction">Science Fiction</option>
                <option value="Thriller">Thriller</option>
            </select>
        </div>

        <div class="form-group">
            <label>Your Rating:</label>
            <div id="star-rating" class="star-container">
                <span class="star" data-value="1">★</span>
                <span class="star" data-value="2">★</span>
                <span class="star" data-value="3">★</span>
                <span class="star" data-value="4">★</span>
                <span class="star" data-value="5">★</span>
            </div>
        </div>
        <button type="submit" id="submitBtn">Save Movie</button>
    </form>

    <hr style="margin: 25px 0; border: 0; border-top: 1px solid #eee;">
    
    <h3>Movie List</h3>
    <div id="movieDisplayList"></div>
</div>

<script>
    let currentRating = 0;
    const stars = document.querySelectorAll('.star');

    // Star Selection Logic
    stars.forEach(star => {
        star.addEventListener('click', () => {
            currentRating = parseInt(star.getAttribute('data-value'));
            updateStarDisplay(currentRating);
        });
    });

    function updateStarDisplay(rating) {
        stars.forEach(s => {
            s.classList.toggle('selected', s.getAttribute('data-value') <= rating);
        });
    }

    // CRUD: Create & Update
    document.getElementById('movieForm').addEventListener('submit', (e) => {
        e.preventDefault();
        
        const titleVal = document.getElementById('title').value.trim();
        const yearVal = document.getElementById('year').value;
        const genreVal = document.getElementById('genre').value;

        if(currentRating === 0) {
            alert("Please select a star rating before saving.");
            return;
        }

        let movies = JSON.parse(localStorage.getItem('movies')) || [];
        
        // Find existing movie for Update logic
        const existingIdx = movies.findIndex(m => m.title.toLowerCase() === titleVal.toLowerCase());

        if (existingIdx !== -1) {
            // Requirement: Average the existing and new rating
            const oldRating = parseFloat(movies[existingIdx].rating);
            const averagedRating = Math.round((oldRating + currentRating) / 2);
            
            movies[existingIdx].year = yearVal;
            movies[existingIdx].genre = genreVal;
            movies[existingIdx].rating = averagedRating;
            
            alert(`"${titleVal}" updated. New average rating: ${averagedRating} stars.`);
        } else {
            // Requirement: Add new movie
            movies.push({
                title: titleVal,
                year: yearVal,
                genre: genreVal,
                rating: currentRating
            });
        }

        localStorage.setItem('movies', JSON.stringify(movies));
        renderList();
        
        // Reset form
        e.target.reset();
        currentRating = 0;
        updateStarDisplay(0);
    });

    // CRUD: Delete
    function deleteMovie(index) {
        if (confirm("Are you sure you want to delete this movie entry?")) {
            let movies = JSON.parse(localStorage.getItem('movies')) || [];
            movies.splice(index, 1);
            localStorage.setItem('movies', JSON.stringify(movies));
            renderList();
        }
    }

    // UI Rendering
    function renderList() {
        const listDiv = document.getElementById('movieDisplayList');
        const movies = JSON.parse(localStorage.getItem('movies')) || [];
        
        if (movies.length === 0) {
            listDiv.innerHTML = '<p style="text-align:center; color:#999; font-size: 13px;">Your list is currently empty.</p>';
            return;
        }

        listDiv.innerHTML = movies.map((m, index) => `
            <div class="movie-item">
                <button class="delete-btn" onclick="deleteMovie(${index})">Delete</button>
                <span class="movie-info">
                    <strong>${m.title}</strong> (${m.year})
                </span>
                <small style="color: #666;">${m.genre}</small><br>
                <span class="rating-stars">${'★'.repeat(m.rating)}${'☆'.repeat(5 - m.rating)}</span>
            </div>
        `).join('');
    }

    // Load list on startup
    renderList(); 
</script>

</body>
</html>
